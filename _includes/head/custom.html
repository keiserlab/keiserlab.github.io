<!-- start custom head snippets -->
<!--<link href="https://fonts.googleapis.com/css?family=PT+Sans+Narrow:400,700|PT+Serif:400,700,400italic" rel="stylesheet" type="text/css">-->

<!-- Resource hints for external CDNs we actually hit on every page.
     preconnect = critical, blocks rendering until handshake completes
     dns-prefetch = nice-to-have, only resolves the name early -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://d1bxh8uas1mnw7.cloudfront.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://api.altmetric.com">
<link rel="dns-prefetch" href="https://badges.altmetric.com">

<!-- Source Serif 4 heading font (600 semibold + 700 bold; async to avoid render-blocking) -->
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&display=swap"></noscript>

<!-- Academicons for preprint / dataset / DOI icons (bioRxiv, chemRxiv, arXiv, Zenodo, OSF, figshare, …)
     Loaded async to avoid render-blocking (only needed for icon display). -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/academicons/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons/css/academicons.min.css"></noscript>

<!-- Altmetric embed.js — scans the DOM for .altmetric-embed divs after parse,
     so defer is the right loading mode. Needed on /publications/; harmless on
     pages without .altmetric-embed divs. -->
<script defer src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"></script>

<!-- Preload hero image for pages that have one (improves LCP) -->
{% if page.header.image %}
<link rel="preload" href="{{ page.header.image | relative_url }}" as="image">
{% elsif page.header.overlay_image %}
<link rel="preload" href="{{ page.header.overlay_image | relative_url }}" as="image">
{% endif %}

<!-- insert favicons. use https://realfavicongenerator.net/ -->
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/icon/favicon-16x16.png">
<link rel="manifest" href="/assets/icon/site.webmanifest">
<link rel="mask-icon" href="/assets/icon/safari-pinned-tab.svg" color="#5bbad5">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="theme-color" content="#ffffff">
<!-- Active page indicator — forces MM's existing ::before underline visible on current nav link -->
{% if page.url %}<style>.greedy-nav .visible-links a[href="{{ page.url }}"]::before{transform:scaleX(1)}.greedy-nav .visible-links a[href="{{ page.url }}"]{color:#2a6f84}</style>{% endif %}
<!-- end custom head snippets -->
