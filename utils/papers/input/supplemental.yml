# Per-paper supplemental content for the publications and resources pages.
#
# Three sections:
#
# 1. standalone_preprints — papers not indexed by PubMed, rendered as standalone
#    entries on the publications page. Full metadata required. Image path is
#    derived from {journal}.{journal_id} (spaces replaced with underscores);
#    keep the existing jpg filename in /assets/images/papers/ when editing.
#
# 2. supplemental — DOI-keyed enrichments to PubMed-indexed papers:
#      - preprint: sidecar link rendered as the secondary button (was preprints.csv)
#      - links:    optional list of code/data buttons rendered on a new row
#
# 3. orphan_tools — tool repos that exist but aren't tied to a lab publication;
#    rendered on the resources page as a separate section.
#
# Each link in `links` has { kind, [role], url, label, [icon] }:
#   - kind: `code` | `data` | `site`
#     - code with role=tool  → github icon, tool column on /resources/
#     - code with role=paper → github icon, paper-repo column on /resources/
#     - data                 → database icon, data column on /resources/
#     - site                 → external-link icon (companion web pages, databases, etc.)
#   - role: `tool` | `paper` (required for code entries)
#   - icon: optional font-awesome class override (e.g., "fab fa-github")

